<!DOCTYPE html>
<html>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon.png">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Tracker</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
    margin:0;
}
.container{
    width:100%;
    padding:10px;
    font-size:14px;
}

/* Inputs */
input{
    padding:10px;
    margin:5px;
    width:92%;
    max-width:320px;
    font-size:14px;
    border-radius:12px;
    border:none;
    background:#e2e8f0;
    color:black;
}

/* Buttons in grid (2 per row) */
.btn-row{
    display:flex;
    gap:6px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    flex:1;
    min-width:45%;
    padding:10px;
    margin:5px 0;
    font-size:13px;
    border-radius:12px;
    border:none;
    background: linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    cursor:pointer;
}

button:hover{opacity:0.9;}

.section{
    background:#1e293b;
    padding:10px;
    border-radius:14px;
    margin-bottom:10px;
}

.table-wrapper{
    overflow-x:auto;
    margin-top:10px;
}

table{
    min-width:800px;
    border-collapse:collapse;
    margin-top:10px;
    background:#020617;
    border-radius:10px;
}

th, td{
    border:1px solid #334155;
    padding:5px;
    font-size:10px;
    text-align:center;
}

.day-box{width:14px;height:14px;}
.header-day{font-size:9px;color:#94a3b8;}

.footer{
    margin-top:20px;
    padding-bottom:20px;
    color:#94a3b8;
    font-size:13px;
}

</style>
</head>
<body>

<h2> Water Tracker</h2>

<div class="container">

<div class="section">
<input type="text" id="name" placeholder="Customer Name">
<div class="btn-row">
<button onclick="addCustomer()">Add Customer</button>
</div>
</div>

<div class="section">
<input type="month" id="monthPicker">
<input type="number" id="price" placeholder="Price per Bottle">

<div class="btn-row">
<button onclick="calculateAll()">Total Profit</button>
<button onclick="customerBill()">Customer Bills</button>
</div>

<div class="btn-row">
<button onclick="downloadExcel()">Download Excel</button>
<button onclick="printBills()">Print Bills</button>
</div>
</div>

<div class="section">
<input type="text" id="searchName" placeholder="Search Customer (A-Z)">
<div class="btn-row">
<button onclick="searchCustomer()">Search</button>
<button onclick="resetSearch()">Show All</button>
</div>
</div>

<h2 id="result"></h2>

<div class="table-wrapper">
<table>
<thead>
<tr id="headerRow">
<th>Name</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="footer">                                          love from pratiyogesh                                             </div>

</div>

<script>
let customers = JSON.parse(localStorage.getItem('customers')) || [];

function save(){
    localStorage.setItem('customers', JSON.stringify(customers));
}

function getDaysInMonth(year, month){
    return new Date(year, month + 1, 0).getDate();
}

function createHeader(){
    let header = document.getElementById('headerRow');
    header.innerHTML = '<th>Name</th>';

    let selected = document.getElementById('monthPicker').value;
    let dateObj = selected ? new Date(selected) : new Date();

    let year = dateObj.getFullYear();
    let month = dateObj.getMonth();

    let days = getDaysInMonth(year, month);

    for(let i=1;i<=days;i++){
        let date = new Date(year, month, i);
        let dayText = date.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
        header.innerHTML += `<th><div>${i}</div><div class="header-day">${dayText}</div></th>`;
    }

    header.innerHTML += '<th>Total</th><th>Del</th>';
}

function addCustomer(){
    let name = document.getElementById('name').value;
    if(name === '') return alert('Enter name');

    let selected = document.getElementById('monthPicker').value;
    let dateObj = selected ? new Date(selected) : new Date();
    let days = getDaysInMonth(dateObj.getFullYear(), dateObj.getMonth());

    customers.push({name, days: new Array(days).fill(0)});
    save();
    display();
}

function toggleDay(cIndex, dIndex, checkbox){
    if(checkbox.checked){
        let qty = parseInt(prompt("How many bottles?", "1"));
        if(!qty || qty < 1) qty = 1;
        customers[cIndex].days[dIndex] = qty;
    } else {
        customers[cIndex].days[dIndex] = 0;
    }
    save();
    display();
}

function deleteCustomer(index){
    customers.splice(index,1);
    save();
    display();
}

function display(filteredList = customers){
    createHeader();

    let table = document.getElementById('tableBody');
    table.innerHTML = '';

    filteredList.forEach(cust => {
        let total = 0;
        let realIndex = customers.indexOf(cust);

        let row = `<tr><td>${cust.name}</td>`;

        cust.days.forEach((day, dIndex)=>{
            total += day;
            row += `<td style="background:${day>0 ? '#16a34a' : 'transparent'}">
            <input type="checkbox" class="day-box" ${day>0 ? 'checked' : ''}
            onchange="toggleDay(${realIndex},${dIndex}, this)">
            ${day>1 ? `<div style='font-size:8px'>${day}</div>` : ''}
            </td>`;
        });

        row += `<td>${total}</td>`;
        row += `<td><button onclick="deleteCustomer(${realIndex})">X</button></td></tr>`;

        table.innerHTML += row;
    });
}

function calculateAll(){
    let price = document.getElementById('price').value || 0;
    let totalBottle = 0;

    customers.forEach(c=>{
        c.days.forEach(d=> totalBottle += d);
    });

    document.getElementById('result').innerText = "Total Profit: = " + (totalBottle * price);
}

function customerBill(){
    let price = document.getElementById('price').value || 0;
    let text = "Customer Bills:\n";

    customers.forEach(c=>{
        let count = c.days.reduce((a,b)=>a+b,0);
        text += c.name + " : = " + (count * price) + "\n";
    });

    alert(text);
}

function downloadExcel(){
    let price = document.getElementById('price').value || 0;
    let csv = "Name,";

    let selected = document.getElementById('monthPicker').value;
    let dateObj = selected ? new Date(selected) : new Date();
    let days = getDaysInMonth(dateObj.getFullYear(), dateObj.getMonth());

    for(let i=1;i<=days;i++) csv += "Day "+i+",";
    csv += "Total Bottles,Total Price\n";

    customers.forEach(c=>{
        let total = 0;
        csv += c.name + ",";

        c.days.forEach(d=>{
            csv += d + ",";
            total += d;
        });

        csv += total + "," + (total * price) + "\n";
    });

    let blob = new Blob([csv], { type: 'text/csv' });
    let url = window.URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = 'water_data.csv';
    a.click();
}

function printBills(){
    let price = document.getElementById('price').value || 0;
    let content = '<h2>Customer Bills</h2>';

    customers.forEach(c=>{
        let count = c.days.reduce((a,b)=>a+b,0);
        content += `<p>${c.name} : ₹${count * price}</p>`;
    });

    let win = window.open('', '', 'width=600,height=600');
    win.document.write(content);
    win.print();
}

function searchCustomer(){
    let text = document.getElementById('searchName').value.toLowerCase();
    let filtered = customers.filter(c => c.name.toLowerCase().startsWith(text));
    display(filtered);
}

function resetSearch(){
    document.getElementById('searchName').value = '';
    display();
}

display();
</script>

</body>
</html>
